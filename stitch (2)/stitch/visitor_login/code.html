<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Visitor Log - NEU Library</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = { theme: { extend: { colors: { neu: { blue: '#003366', accent:'#facc15', light:'#f8fafc' } } } } };
</script>
</head>
<body class="bg-neu-light font-sans text-slate-800 min-h-screen flex flex-col">
<header class="bg-neu-blue text-white py-6 shadow-md">
<div class="container mx-auto px-4 flex justify-between items-center">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-neu-blue font-bold text-xl">NEU</div>
<div><h1 class="text-2xl font-bold tracking-tight">University Library</h1><p class="text-sm opacity-80">Visitor Log System</p></div>
</div>
<div class="hidden md:block text-right"><p class="text-xs uppercase tracking-widest opacity-70">Welcome to Knowledge</p></div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-4">
<div class="bg-white w-full max-auto max-w-md rounded-xl shadow-xl overflow-hidden border border-slate-200">
<div class="bg-slate-50 border-b border-slate-200 p-6 text-center">
<h2 class="text-xl font-semibold text-neu-blue">Visitor Entry</h2>
<p class="text-sm text-slate-500">Please provide your credentials to log your visit</p>
</div>
<div class="hidden m-6 p-4 bg-green-50 border border-green-200 rounded-lg flex items-center space-x-3" id="success-alert">
<svg class="w-5 h-5 text-green-500" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path></svg>
<span class="text-green-800 font-medium">Welcome to NEU Library!</span>
</div>
<form id="visitor-form" class="p-8 space-y-6">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700" for="identifier">Institutional Email or RFID Number</label>
<input class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-neu-blue focus:border-neu-blue transition-all" id="identifier" name="identifier" placeholder="name@neu.edu.ph or RFID#" required type="text"/>
<p class="hidden text-xs text-red-500 mt-1" id="email-error">Please use a valid university email address (@neu.edu.ph).</p>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700" for="purpose">Purpose of Visit</label>
<select class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-neu-blue focus:border-neu-blue bg-white transition-all" id="purpose" name="purpose" required>
<option disabled selected value="">Select purpose...</option>
<option value="Reading">Reading</option>
<option value="Researching">Researching</option>
<option value="Studying">Studying</option>
<option value="Computer">Use of Computer</option>
</select>
</div>
<button class="w-full bg-neu-blue hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform active:scale-95 transition-all duration-150" type="submit">Submit Log Entry</button>
</form>
</div>
</main>
<footer class="py-6 text-center text-slate-400 text-xs border-t border-slate-200">
<p>© 2023 NEU Library Information Systems. All Rights Reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
const firebaseConfig = { apiKey: "AIzaSyCcGv26mi0A_ohEt8vSw6Y8Z4ss1FOtFSc", authDomain: "neu-library-visitor-log-7095e.firebaseapp.com", projectId: "neu-library-visitor-log-7095e", storageBucket: "neu-library-visitor-log-7095e.firebasestorage.app", messagingSenderId: "104428636117", appId: "1:104428636117:web:fed537fd7f7c85fc739f5c", measurementId: "G-LH3GWN7Y1N" };
const app = initializeApp(firebaseConfig); const analytics = getAnalytics(app);

document.getElementById('visitor-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const identifier = document.getElementById('identifier').value;
  const emailError = document.getElementById('email-error');
  const successAlert = document.getElementById('success-alert');
  const form = this;

  const isEmail = identifier.includes('@');
  const isUniversityDomain = identifier.toLowerCase().endsWith('@neu.edu.ph');

  if(isEmail && !isUniversityDomain) {
    emailError.classList.remove('hidden');
    document.getElementById('identifier').classList.add('border-red-500');
    return;
  }

  emailError.classList.add('hidden');
  document.getElementById('identifier').classList.remove('border-red-500');

  form.classList.add('opacity-0', 'pointer-events-none');
  setTimeout(() => {
    form.classList.add('hidden');
    successAlert.classList.remove('hidden');
    successAlert.classList.add('animate-bounce');
    setTimeout(() => { location.reload(); }, 3000);
  }, 300);
});
</script>
</body>
</html>
